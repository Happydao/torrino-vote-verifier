<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torrino DAO Vote Verifier</title>

  <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bs58@5.0.0/dist/bs58.min.js"></script>

  <style>
    body {
      background: #081330;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      padding: 24px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 24px;
    }
    .card {
      background: #1e2a44;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 20px;
      margin: 12px 0 8px;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      background: #071633;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 18px;
      font-family: monospace;
    }
    textarea {
      resize: vertical;
      min-height: 90px;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #44b6ea;
      color: black;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }
    .result {
      margin-top: 22px;
      font-size: 22px;
      font-weight: bold;
    }
    .ok { color: #22c55e; }
    .bad { color: #ef4444; }
    .debug {
      margin-top: 20px;
      background: #071633;
      border-radius: 12px;
      padding: 14px;
      font-family: monospace;
      font-size: 14px;
      white-space: pre-wrap;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Torrino DAO Vote Verifier</h1>

    <div class="card">
      Insert EXACT values from CSV:
      <br />
      wallet → signed_message → signature
    </div>

    <div class="card">
      <label for="wallet">Wallet</label>
      <input id="wallet" />

      <label for="message">Signed Message (DO NOT MODIFY)</label>
      <textarea id="message"></textarea>

      <label for="signature">Signature</label>
      <textarea id="signature"></textarea>

      <button id="verifyBtn">Verify</button>

      <div id="result" class="result"></div>
      <div id="debug" class="debug"></div>
    </div>
  </div>

  <script>
    function setResult(ok, text) {
      const el = document.getElementById("result");
      el.className = "result " + (ok ? "ok" : "bad");
      el.textContent = text;
    }

    function setDebug(text) {
      document.getElementById("debug").textContent = text;
    }

    function verify() {
      const wallet = document.getElementById("wallet").value.trim();
      const message = document.getElementById("message").value;
      const signature = document.getElementById("signature").value.trim();

      try {
        if (!window.nacl) {
          throw new Error("tweetnacl non caricato");
        }
        if (!window.bs58 || typeof window.bs58.decode !== "function") {
          throw new Error("bs58 non caricato");
        }
        if (!wallet || !message || !signature) {
          throw new Error("Campi mancanti");
        }

        const encoder = new TextEncoder();

        const pubKeyBytes = window.bs58.decode(wallet);
        const sigBytes = window.bs58.decode(signature);
        const msgBytes = encoder.encode(message);

        const valid = window.nacl.sign.detached.verify(
          msgBytes,
          sigBytes,
          pubKeyBytes
        );

        setResult(valid, valid ? "✅ VALID SIGNATURE" : "❌ INVALID SIGNATURE");

        const debug = [
          "wallet length: " + wallet.length,
          "message length: " + message.length,
          "signature length: " + signature.length,
          "pubKey bytes length: " + pubKeyBytes.length,
          "signature bytes length: " + sigBytes.length,
          "message char codes (last 12): " + JSON.stringify([...message].slice(-12).map(c => c.charCodeAt(0))),
          "message preview: " + JSON.stringify(message),
          "valid: " + valid
        ].join("\n");

        setDebug(debug);
      } catch (err) {
        console.error(err);
        setResult(false, "❌ ERROR");
        setDebug("Errore: " + err.message);
      }
    }

    document.getElementById("verifyBtn").addEventListener("click", verify);

    // Dati test identici al tuo script Node
    document.getElementById("wallet").value =
      "59C4gdQT5VFqZj8LTw5bt4CTzJkJpncujiG3xfngCzs8";

    document.getElementById("message").value =
      "Torrino DAO governance vote:FAVOREVOLE:wallet:59C4gdQT5VFqZj8LTw5bt4CTzJkJpncujiG3xfngCzs8:timestamp:1773860585777";

    document.getElementById("signature").value =
      "4Tkq6GNtYe2ex67nimnxkrNAHvnKxhASd7qeVkVJoXJKwFn8jWPHgbyK7AKEj1oyMqMj5jseGzNyodUHKRoG98cm";
  </script>
</body>
</html>
