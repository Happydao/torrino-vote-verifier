<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Torrino DAO Vote Verifier</title>

<script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bs58@5.0.0/dist/bs58.min.js"></script>

<style>
body { background:#0f172a; color:#e2e8f0; font-family:Arial; padding:20px; }
.container { max-width:750px; margin:auto; }
.card { background:#1e293b; padding:20px; border-radius:12px; margin-top:20px; }
input, textarea {
  width:100%; padding:10px; border-radius:8px; border:none;
  margin-top:5px; background:#0f172a; color:white;
}
button {
  margin-top:15px; padding:12px; width:100%;
  border:none; border-radius:8px; background:#38bdf8;
  font-weight:bold; cursor:pointer;
}
.result { margin-top:20px; font-size:18px; font-weight:bold; }
.ok { color:#22c55e; }
.bad { color:#ef4444; }
</style>
</head>

<body>

<div class="container">

<h1>🔐 Torrino DAO Vote Verifier</h1>

<div class="card">
<p>
Insert EXACT values from CSV:<br>
wallet → signed_message → signature
</p>
</div>

<div class="card">

<label>Wallet</label>
<input id="wallet">

<label>Signed Message (DO NOT MODIFY)</label>
<textarea id="message" rows="4"></textarea>

<label>Signature</label>
<textarea id="signature" rows="3"></textarea>

<button onclick="verify()">Verify</button>

<div id="result" class="result"></div>

</div>
</div>

<script>
function verify() {
  const wallet = document.getElementById("wallet").value.trim();
  const message = document.getElementById("message").value;
  const signature = document.getElementById("signature").value.trim();
  const resultDiv = document.getElementById("result");

  try {
    if (!wallet || !message || !signature) {
      throw new Error("Missing input");
    }

    const encoder = new TextEncoder();

    // 🔑 decode
    const pubKey = bs58.decode(wallet);
    const sig = bs58.decode(signature);

    // ⚠️ IMPORTANT: NON TOCCARE IL MESSAGGIO
    const msgBytes = encoder.encode(message);

    // 🔍 verifica
    let valid = nacl.sign.detached.verify(msgBytes, sig, pubKey);

    // fallback con prefisso (alcuni wallet)
    if (!valid) {
      const prefixed = `\x19Solana Signed Message:\n${message}`;
      valid = nacl.sign.detached.verify(
        encoder.encode(prefixed),
        sig,
        pubKey
      );
    }

    resultDiv.innerHTML = valid
      ? "<span class='ok'>✅ VALID SIGNATURE</span>"
      : "<span class='bad'>❌ INVALID SIGNATURE</span>";

  } catch (e) {
    console.error(e);
    resultDiv.innerHTML = "<span class='bad'>❌ ERROR</span>";
  }
}
</script>

</body>
</html>
