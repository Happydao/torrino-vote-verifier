<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Torrino DAO Vote Verifier</title>

  <!-- LIBRERIE -->
  <script src="https://unpkg.com/tweetnacl@1.0.3/nacl.min.js"></script>
  <script src="https://unpkg.com/bs58@5.0.0/dist/bs58.min.js"></script>
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial;
      padding: 20px;
    }

    .container {
      max-width: 750px;
      margin: auto;
    }

    h1 {
      color: #38bdf8;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 5px;
      background: #0f172a;
      color: white;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .ok { color: #22c55e; }
    .bad { color: #ef4444; }

    .info {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔐 Torrino DAO Vote Verifier</h1>

  <div class="card">
    <p class="info">
      Paste data from the CSV files:<br>
      wallet → signed_message → signature
    </p>
  </div>

  <div class="card">

    <h3>Input</h3>

    <label>Wallet address</label>
    <input id="wallet">

    <label>Signed message (CSV: signed_message)</label>
    <textarea id="message" rows="4"></textarea>

    <label>Signature (CSV: signature)</label>
    <textarea id="signature" rows="3"></textarea>

    <button onclick="verify()">Verify Vote</button>

    <div id="result" class="result"></div>

  </div>

</div>

<script>
function verify() {
  const wallet = document.getElementById("wallet").value.trim();
  let message = document.getElementById("message").value;
  const signature = document.getElementById("signature").value.trim();

  const resultDiv = document.getElementById("result");

  try {
    if (!wallet || !message || !signature) {
      throw new Error("Missing input");
    }

    // 🔥 NORMALIZZA
    message = message
      .replace(/\r/g, "")
      .replace(/\n/g, "")
      .trim();

    const messageBytes = new TextEncoder().encode(message);
    const signatureBytes = window.bs58.decode(signature);

    const publicKey = new solanaWeb3.PublicKey(wallet);
    const publicKeyBytes = publicKey.toBytes();

    // ✅ Tentativo 1: messaggio diretto
    let isValid = nacl.sign.detached.verify(
      messageBytes,
      signatureBytes,
      publicKeyBytes
    );

    // ✅ Tentativo 2: con prefisso Solana
    if (!isValid) {
      const prefixed = "Solana Signed Message:\n" + message;

      isValid = nacl.sign.detached.verify(
        new TextEncoder().encode(prefixed),
        signatureBytes,
        publicKeyBytes
      );
    }

    resultDiv.innerHTML = isValid
      ? "<span class='ok'>✅ Valid Signature</span>"
      : "<span class='bad'>❌ Invalid Signature</span>";

  } catch (err) {
    console.error(err);
    resultDiv.innerHTML = "<span class='bad'>❌ Error: invalid input data</span>";
  }
}
</script>

</body>
</html>
